<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NovaLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Nova<span>Learn</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/login.html" class="active">Login</a></li>
      <li><a href="/dashboard.html" id="dashboardLink" style="display:none">Dashboard</a></li>
    </ul>
  </nav>

  <main class="page">
    <div class="form-card" id="loginForm">
      <h2>Welcome Back</h2>
      <div class="form-error" id="loginError"></div>
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary" id="loginBtn">Sign In</button>
      <p class="form-footer">Don't have an account? <a id="showSignup">Create one</a></p>
    </div>

    <div class="form-card" id="signupForm" style="display:none">
      <h2>Create Account</h2>
      <div class="form-error" id="signupError"></div>
      <div class="form-group">
        <label for="signupName">Full Name</label>
        <input type="text" id="signupName" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" placeholder="At least 6 characters">
      </div>
      <button class="btn btn-primary" id="signupBtn">Sign Up</button>
      <p class="form-footer">Already have an account? <a id="showLogin">Sign in</a></p>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
